<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinanceAI — Personal Finance Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #242736;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #2d3150;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Layout */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      text-align: left;
      transition: all 0.2s;
      width: 100%;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      background: rgba(79, 142, 247, 0.08);
    }

    .quick-btn .icon { margin-right: 8px; }

    /* Analyze Form */
    .analyze-form {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .analyze-form input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.82rem;
      margin-bottom: 8px;
    }

    .analyze-form input::placeholder { color: var(--muted); }
    .analyze-form input:focus { outline: none; border-color: var(--accent); }

    .btn-analyze {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
      padding: 9px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .btn-analyze:hover { opacity: 0.9; }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user .msg-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .user .msg-meta { text-align: right; }

    .tool-badge {
      display: inline-block;
      background: rgba(79,142,247,0.15);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.3);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      margin-top: 6px;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .welcome .big-icon { font-size: 3rem; margin-bottom: 12px; }
    .welcome h2 { color: var(--text); margin-bottom: 8px; }
    .welcome p { font-size: 0.9rem; max-width: 400px; margin: 0 auto; }

    /* Typing Indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 8px; height: 8px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Input */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.92rem;
      resize: none;
      min-height: 44px;
      max-height: 150px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn-send {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
      width: 44px; height: 44px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .btn-send:hover { opacity: 0.9; }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 44px; height: 44px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* Result cards */
    .data-card {
      margin-top: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.82rem;
    }

    .data-card .label { color: var(--muted); font-size: 0.75rem; }
    .data-card .value { font-weight: 600; margin-bottom: 4px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">💰</div>
  <div>
    <h1>FinanceAI</h1>
    <p>Personal Finance Assistant • Local LLM Powered</p>
  </div>
  <div class="status-dot" title="Local LLM Active"></div>
</header>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h3>Quick Actions</h3>
      <button class="quick-btn" onclick="ask('Check my loan eligibility for ₹10 lakh with income ₹50,000 and EMI ₹8,000')">
        <span class="icon">🏦</span> Loan Eligibility
      </button>
      <button class="quick-btn" onclick="ask('Estimate my credit score with income ₹60,000 and EMI ₹15,000')">
        <span class="icon">📊</span> Credit Score
      </button>
      <button class="quick-btn" onclick="ask('Where should I invest ₹20,000 per month?')">
        <span class="icon">📈</span> Investment Advice
      </button>
      <button class="quick-btn" onclick="ask('Assess my financial risk with income ₹45,000 and EMI ₹22,000')">
        <span class="icon">⚠️</span> Risk Assessment
      </button>
      <button class="quick-btn" onclick="ask('How can I improve my savings rate?')">
        <span class="icon">💡</span> Savings Tips
      </button>
      <button class="quick-btn" onclick="ask('What is a good debt to income ratio?')">
        <span class="icon">📚</span> Finance Basics
      </button>
    </div>

    <div>
      <h3>Full Analysis</h3>
      <div class="analyze-form">
        <input type="number" id="f-income" placeholder="Monthly Income (₹)">
        <input type="number" id="f-expenses" placeholder="Monthly Expenses (₹)">
        <input type="number" id="f-emis" placeholder="Total EMIs (₹)">
        <input type="number" id="f-savings" placeholder="Current Savings (₹)">
        <button class="btn-analyze" onclick="runAnalysis()">🔍 Analyze Now</button>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="big-icon">🤖</div>
        <h2>Welcome to FinanceAI</h2>
        <p>Your intelligent personal finance advisor. Ask me anything about loans, investments, credit scores, or financial planning.</p>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="userInput"
        placeholder="Ask about loans, investments, credit score, EMI, savings..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-clear" onclick="clearChat()" title="Clear chat">🗑️</button>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function ask(text) {
    inputEl.value = text;
    sendMessage();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, content, toolUsed = null, data = null) {
    // Remove welcome screen if present
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    let dataHtml = '';
    if (data && Object.keys(data).length > 0 && !data.error) {
      const entries = Object.entries(data).slice(0, 5);
      dataHtml = `<div class="data-card">` + entries.map(([k, v]) => {
        const label = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const val = typeof v === 'object' ? JSON.stringify(v) : v;
        return `<div class="label">${label}</div><div class="value">${val}</div>`;
      }).join('') + `</div>`;
    }

    const toolBadge = toolUsed && toolUsed !== 'general'
      ? `<div class="tool-badge">🔧 ${toolUsed} engine</div>` : '';

    div.innerHTML = `
      <div class="msg-bubble">${escapeHtml(content)}${dataHtml}</div>
      ${toolBadge}
      <div class="msg-meta">${time}</div>
    `;

    messagesEl.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const msg = inputEl.value.trim();
    if (!msg) return;

    addMessage('user', msg);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typing = showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
      });
      const data = await res.json();
      typing.remove();
      addMessage('assistant', data.response, data.tool_used, data.data);
    } catch (err) {
      typing.remove();
      addMessage('assistant', '⚠️ Could not reach the AI backend. Ensure Flask is running on port 5000.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function runAnalysis() {
    const income = document.getElementById('f-income').value;
    const expenses = document.getElementById('f-expenses').value;
    const emis = document.getElementById('f-emis').value;
    const savings = document.getElementById('f-savings').value;

    if (!income) {
      alert('Please enter at least your monthly income.');
      return;
    }

    addMessage('user', `Run full financial analysis: Income ₹${income}, Expenses ₹${expenses||0}, EMIs ₹${emis||0}, Savings ₹${savings||0}`);
    const typing = showTyping();

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          monthly_income: income,
          monthly_expenses: expenses || 0,
          total_emis: emis || 0,
          savings: savings || 0
        })
      });
      const data = await res.json();
      typing.remove();

      const summary = `📊 Financial Analysis Complete!

🏥 Health Score: ${data.financial_health_score}/100 — ${data.health_label}
💰 Disposable Income: ₹${data.disposable_income?.toLocaleString()}
📉 Debt-to-Income: ${data.debt_to_income_ratio}%
💾 Savings Rate: ${data.savings_rate_percent}%
🆘 Emergency Fund: ${data.emergency_fund_months} months

${data.warnings?.length ? '⚠️ Warnings:\n' + data.warnings.join('\n') : '✅ No critical warnings!'}

💡 Tips:\n${data.recommendations?.join('\n')}`;

      addMessage('assistant', summary, 'analysis');
    } catch (err) {
      typing.remove();
      addMessage('assistant', '⚠️ Analysis failed. Check your Flask backend.');
    }
  }

  async function clearChat() {
    if (!confirm('Clear conversation history?')) return;
    await fetch('/api/clear', {method: 'POST'});
    messagesEl.innerHTML = `<div class="welcome">
      <div class="big-icon">🤖</div>
      <h2>Chat Cleared</h2>
      <p>Start a new conversation about your finances.</p>
    </div>`;
  }
</script>
</body>
</html>
